<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Solar System for Kids</title>
  <link rel="stylesheet" href="css/style.css">
</head>
<body class="page--index">

  <button id="myClassBtn" class="my-class-btn hidden" type="button">
    My Class
  </button>

  <button id="logout-btn" class="logout-btn hidden" type="button">
    Logout
  </button>

  <div id="user-box" class="user-box hidden"></div>

  <h1>Solar System 💫</h1>
  <p>Hover over a planet to learn more!</p>

  <div class="planet-map-wrap" aria-label="Solar system map">
  <div class="planet-map" id="planets-container">
    <div class="planet planet--sun" data-name="Sun" data-description="The star at the center of our Solar System.">
      <a href="planet.html?name=sun">
        <img class="planet__img" src="images/sun.png" alt="Sun" width="260" height="260">
      </a>
      <div class="planet-score"></div>
    </div>

    <div class="planet planet--mercury" data-name="Mercury" data-description="The closest planet to the Sun.">
      <a href="planet.html?name=mercury">
        <img class="planet__img" src="images/mercury.png" alt="Mercury" width="70" height="70">
      </a>
      <div class="planet-score"></div>
    </div>

    <div class="planet planet--venus" data-name="Venus" data-description="Similar in size to Earth, but extremely hot.">
      <a href="planet.html?name=venus">
        <img class="planet__img" src="images/venus.png" alt="Venus" width="100" height="100">
      </a>
      <div class="planet-score"></div>
    </div>

    <div class="planet planet--earth" data-name="Earth" data-description="Our home planet 🌍">
      <a href="planet.html?name=earth">
        <img class="planet__img" src="images/earth.png" alt="Earth" width="100" height="100">
      </a>
      <div class="planet-score"></div>
    </div>

    <div class="planet planet--mars" data-name="Mars" data-description="The Red Planet, named after the Roman god of war.">
      <a href="planet.html?name=mars">
        <img class="planet__img" src="images/mars.png" alt="Mars" width="80" height="80">
      </a>
      <div class="planet-score"></div>
    </div>

    <div class="planet planet--jupiter" data-name="Jupiter" data-description="The largest planet in the Solar System — a gas giant.">
      <a href="planet.html?name=jupiter">
        <img class="planet__img" src="images/jupiter.png" alt="Jupiter" width="180" height="180">
      </a>
      <div class="planet-score"></div>
    </div>

    <div class="planet planet--saturn" data-name="Saturn" data-description="Famous for its stunning rings made of ice and rock.">
      <a href="planet.html?name=saturn">
        <img class="planet__img" src="images/saturn.png" alt="Saturn" height="190">
      </a>
      <div class="planet-score"></div>
    </div>

    <div class="planet planet--uranus" data-name="Uranus" data-description="An icy giant that rotates on its side.">
      <a href="planet.html?name=uranus">
        <img class="planet__img" src="images/uranus.png" alt="Uranus" width="110" height="110">
      </a>
      <div class="planet-score"></div>
    </div>

    <div class="planet planet--neptune" data-name="Neptune" data-description="A blue giant with the strongest winds in the Solar System.">
      <a href="planet.html?name=neptune">
        <img class="planet__img" src="images/neptune.png" alt="Neptune" width="100" height="100">
      </a>
      <div class="planet-score"></div>
    </div>
  </div>
  </div>

  <div id="tooltip" class="tooltip"></div>

  <div id="auth-modal" class="modal">
    <div class="modal-content">

      <div id="login-section">
        <h2>Login</h2>
        <form id="login-form">
          <input type="text" id="login-username" placeholder="Username" required>
          <input type="password" id="login-password" placeholder="Password" required>
          <select id="login-role" class="custom-select" required>
            <option value="">Select Role</option>
            <option value="student">Student</option>
            <option value="teacher">Teacher</option>
          </select>
          <button type="submit" class="btn">Login</button>
        </form>
        <p>Don't have an account? <a href="#" id="show-register-link">Register</a></p>
      </div>

      <div id="register-section" class="hidden">
        <h2>Register</h2>
        <form id="register-form">
          <input type="text" id="register-username" placeholder="Username" required>
          <input type="password" id="register-password" placeholder="Password" required>
          <input type="number" id="register-class" placeholder="Class" min="1" max="11" required>
          <select id="register-role" class="custom-select" required>
            <option value="">Select Role</option>
            <option value="student">Student</option>
            <option value="teacher">Teacher</option>
          </select>
          <button type="submit" class="btn">Register</button>
        </form>
        <p>Already have an account? <a href="#" id="show-login-link">Login</a></p>
      </div>

    </div>
  </div>

  <script type="module" src="js/app.js"></script>
</body>
</html>
