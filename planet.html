<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title id="pageTitle">Planet</title>
  <link rel="stylesheet" href="css/style.css" />
</head>
<body class="page--planet">

  <div class="content-box">
    <a href="index.html" class="link-back">← Go back</a>
    <h1 id="planetTitle" class="planet-title"></h1>
    <img id="planetImage" src="" alt="Planet" width="200">
    <div>
      <p id="planetDescription"></p>
    </div>
    <button id="startTestBtn" class="check-btn" type="button" disabled>Loading quiz…</button>
    <div id="resultStars" class="stars"></div>
  </div>

  <div class="quiz-overlay hidden" id="quizOverlay">
    <div class="quiz-modal">
      <button id="close-quiz" class="close-btn" type="button" aria-label="Close quiz">&times;</button>
      <div id="questionContainer"></div>
      <div id="feedback" class="feedback"></div>
      <button id="nextBtn" class="continue-btn hidden" type="button">Continue</button>
    </div>
  </div>

  <script type="module" src="js/app.js"></script>
</body>
</html>
